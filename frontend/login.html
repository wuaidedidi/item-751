<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="企业员工信息管理系统 - 用户登录">
    <title>登录 - 企业员工信息管理系统</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>
    <div class="login-page">
        <div class="login-container">
            <!-- 左侧品牌区域 -->
            <div class="login-brand">
                <div class="login-brand-logo">🏢</div>
                <h1 class="login-brand-title">企业员工信息<br>管理系统</h1>
                <p class="login-brand-subtitle">
                    高效、安全的企业人力资源管理平台，助力企业数字化转型升级
                </p>
                <div class="login-brand-features">
                    <div class="login-feature">
                        <div class="login-feature-icon">👥</div>
                        <span class="login-feature-text">员工信息集中管理</span>
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">🏛️</div>
                        <span class="login-feature-text">部门架构可视化</span>
                    </div>
                    <div class="login-feature">
                        <div class="login-feature-icon">📊</div>
                        <span class="login-feature-text">数据统计与分析</span>
                    </div>
                </div>
            </div>

            <!-- 右侧表单区域 -->
            <div class="login-form-container">
                <div class="login-form-card">
                    <div class="login-form-header">
                        <h2 class="login-form-title">欢迎回来</h2>
                        <p class="login-form-desc">请输入您的账号信息登录系统</p>
                    </div>

                    <form id="loginForm" class="login-form" novalidate>
                        <div class="form-group">
                            <label class="form-label required">用户名</label>
                            <div class="input-with-icon">
                                <input type="text" 
                                       id="username" 
                                       name="username" 
                                       class="form-input" 
                                       placeholder="请输入用户名"
                                       required
                                       autocomplete="username">
                                <span class="input-icon">👤</span>
                            </div>
                            <span class="form-error"></span>
                        </div>

                        <div class="form-group">
                            <label class="form-label required">密码</label>
                            <div class="input-with-icon">
                                <input type="password" 
                                       id="password" 
                                       name="password" 
                                       class="form-input" 
                                       placeholder="请输入密码"
                                       required
                                       autocomplete="current-password">
                                <span class="input-icon">🔒</span>
                                <button type="button" class="password-toggle" id="togglePassword">👁</button>
                            </div>
                            <span class="form-error"></span>
                        </div>

                        <button type="submit" class="btn btn-primary" id="loginBtn">
                            <span id="loginBtnText">登 录</span>
                            <span id="loginBtnLoading" class="hidden">登录中...</span>
                        </button>
                    </form>

                    <div class="login-form-footer">
                        <p>还没有账号？<a href="register.html">立即注册</a></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/components.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // 检查是否已登录
            if (TokenManager.getToken()) {
                window.location.href = '/index.html';
                return;
            }

            const form = document.getElementById('loginForm');
            const loginBtn = document.getElementById('loginBtn');
            const loginBtnText = document.getElementById('loginBtnText');
            const loginBtnLoading = document.getElementById('loginBtnLoading');
            const togglePassword = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');

            // 密码显示/隐藏
            togglePassword.addEventListener('click', function() {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                this.textContent = type === 'password' ? '👁' : '🙈';
            });

            // 表单提交
            form.addEventListener('submit', async function(e) {
                e.preventDefault();

                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                // 验证
                let hasError = false;
                if (!username) {
                    showFieldError('username', '请输入用户名');
                    hasError = true;
                } else {
                    clearFieldError('username');
                }

                if (!password) {
                    showFieldError('password', '请输入密码');
                    hasError = true;
                } else {
                    clearFieldError('password');
                }

                if (hasError) return;

                // 提交
                setLoading(true);
                try {
                    const result = await AuthAPI.login({ username, password });
                    
                    // 保存Token和用户信息
                    TokenManager.setToken(result.data.token);
                    TokenManager.setUser({
                        id: result.data.userId,
                        username: result.data.username,
                        nickname: result.data.nickname,
                        avatar: result.data.avatar
                    });

                    Toast.success('登录成功，正在跳转...');
                    
                    setTimeout(() => {
                        window.location.href = '/index.html';
                    }, 500);
                } catch (error) {
                    Toast.error(error.message || '登录失败，请检查用户名和密码');
                } finally {
                    setLoading(false);
                }
            });

            function showFieldError(fieldId, message) {
                const field = document.getElementById(fieldId);
                const errorEl = field.parentElement.parentElement.querySelector('.form-error');
                field.classList.add('error');
                if (errorEl) {
                    errorEl.textContent = message;
                    errorEl.style.display = 'block';
                }
            }

            function clearFieldError(fieldId) {
                const field = document.getElementById(fieldId);
                const errorEl = field.parentElement.parentElement.querySelector('.form-error');
                field.classList.remove('error');
                if (errorEl) {
                    errorEl.style.display = 'none';
                }
            }

            function setLoading(loading) {
                loginBtn.disabled = loading;
                loginBtnText.classList.toggle('hidden', loading);
                loginBtnLoading.classList.toggle('hidden', !loading);
            }
        });
    </script>
</body>
</html>
